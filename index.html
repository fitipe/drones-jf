const osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '© OpenStreetMap'
});
const satLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  maxZoom: 19,
  attribution: '© Esri'
});
const roadsLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', {
  minZoom: 13, maxZoom: 19, attribution: '© CartoDB', pane: 'labelsPane'
});
const topoLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}', {
  maxZoom: 19, attribution: '© Esri'
});

const map = L.map('map', {
  center: [-21.762, -43.35],
  zoom: 13,
  layers: [osmLayer]
});

map.createPane('labelsPane');
map.getPane('labelsPane').style.zIndex = 450;
map.getPane('labelsPane').style.pointerEvents = 'none';
map.getPane('labelsPane').style.mixBlendMode = 'screen';
map.getPane('labelsPane').style.filter = 'grayscale(1) invert(1) brightness(2) contrast(1.5)';

let roadsGeoJSON = null;
let roadsGeoJSONLayer = null;
let hybridActive = false;
const ROADS_MIN_ZOOM = 15;

// Pesos base por tipo de via (em zoom 15)
const BASE_WEIGHTS = {
  motorway: 20, trunk: 20, motorway_link: 12, trunk_link: 12,
  primary: 15, primary_link: 9,
  secondary: 10, secondary_link: 7,
  tertiary: 7, tertiary_link: 5,
  _default: 4
};

function scaleForZoom(base) {
  const z = map ? map.getZoom() : 15;
  // zoom 15 = base, cresce com zoom
  return base * Math.pow(2.0, (z - 17) / 2.5);
}

function getRoadStyle(feature) {
  const hw = feature.properties.highway;
  const base = BASE_WEIGHTS[hw] || BASE_WEIGHTS._default;
  const w = scaleForZoom(base);
  return {color:'#8a8a8a', weight:w, opacity:0.55, lineCap:'round', lineJoin:'round'};
}

function getRoadOutlineStyle(feature) {
  const hw = feature.properties.highway;
  const base = (BASE_WEIGHTS[hw] || BASE_WEIGHTS._default) + 1.5;
  const w = scaleForZoom(base);
  return {color:'rgba(0,0,0,0.4)', weight:w, opacity:1, lineCap:'round', lineJoin:'round'};
}

function loadRoadsGeoJSON(callback) {
  if (roadsGeoJSON) { callback(); return; }
  fetch('roads_jf.geojson')
    .then(r => r.json())
    .then(data => {
      roadsGeoJSON = data;
      callback();
    });
}

function updateRoadsVisibility() {
  if (!roadsGeoJSONLayer || !window._roadsOutline || !hybridActive) return;
  const show = map.getZoom() >= ROADS_MIN_ZOOM;
  if (show) {
    if (!map.hasLayer(window._roadsOutline)) map.addLayer(window._roadsOutline);
    if (!map.hasLayer(roadsGeoJSONLayer)) map.addLayer(roadsGeoJSONLayer);
  } else {
    if (map.hasLayer(window._roadsOutline)) map.removeLayer(window._roadsOutline);
    if (map.hasLayer(roadsGeoJSONLayer)) map.removeLayer(roadsGeoJSONLayer);
  }
}

function addRoadsLayer() {
  if (roadsGeoJSONLayer) {
    updateRoadsVisibility();
    return;
  }
  loadRoadsGeoJSON(function() {
    window._roadsOutline = L.geoJSON(roadsGeoJSON, {style: getRoadOutlineStyle, interactive: false});
    window._roadsFill = L.geoJSON(roadsGeoJSON, {style: getRoadStyle, interactive: false});
    roadsGeoJSONLayer = window._roadsFill;
    updateRoadsVisibility();
    map.on('zoomend', function() {
      if (!hybridActive) return;
      window._roadsOutline.setStyle(getRoadOutlineStyle);
      window._roadsFill.setStyle(getRoadStyle);
      updateRoadsVisibility();
    });
  });
}

function removeRoadsLayer() {
  if (window._roadsOutline) map.removeLayer(window._roadsOutline);
  if (roadsGeoJSONLayer) map.removeLayer(roadsGeoJSONLayer);
}


// --- Icons ---
const svgFoto = `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0.75 1.5 24 24' fill='white' width='19' height='19' style='display:block'><path d='M20 5h-3.17L15 3H9L7.17 5H4C2.9 5 2 5.9 2 7v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm-8 13c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z'/></svg>`;
const svgVideo = `<svg xmlns='http://www.w3.org/2000/svg' viewBox='1 1 24 24' fill='white' width='19' height='19' style='display:block'><path d='M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z'/></svg>`;
const mkCircle = (bg, border, svg) =>
  `<div style="width:34px;height:34px;border-radius:50%;background:${bg};border:2px solid ${border};box-shadow:0 1px 4px rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center">${svg}</div>`;
const iconFoto = L.divIcon({ className:'', html: mkCircle('#1976D2','white',svgFoto), iconSize:[34,34], iconAnchor:[17,17] });
const iconVideo = L.divIcon({ className:'', html: mkCircle('#D81B60','white',svgVideo), iconSize:[34,34], iconAnchor:[17,17] });
const C_FOTO = [25, 118, 210];
const C_VIDEO = [216, 27, 96];
function lerpRGB(a, b, t) {
  return [Math.round(a[0]+(b[0]-a[0])*t), Math.round(a[1]+(b[1]-a[1])*t), Math.round(a[2]+(b[2]-a[2])*t)];
}
function makeClusterIcon(cluster) {
  const markers = cluster.getAllChildMarkers();
  const n = markers.length;
  let ro, ri;
  if (map && map.getZoom() >= 17) {
    const nVideo = markers.filter(m => m.options.icon === iconVideo).length;
    const [r,g,b] = nVideo > n / 2 ? C_VIDEO : C_FOTO;
    ro = `rgba(${r},${g},${b},0.6)`;
    ri = `rgba(${r},${g},${b},0.75)`;
  } else {
    if (n < 10)       { ro='rgba(247,224,122,0.6)'; ri='rgba(247,218,80,0.75)'; }
    else if (n < 50)  { ro='rgba(241,211,87,0.6)';  ri='rgba(241,200,50,0.75)'; }
    else if (n < 150) { ro='rgba(243,197,64,0.6)';  ri='rgba(243,185,30,0.75)'; }
    else              { ro='rgba(244,165,39,0.6)';   ri='rgba(244,150,10,0.75)'; }
  }
  const size = n >= 150 ? 44 : n >= 50 ? 38 : n >= 10 ? 32 : 26;
  const outer = size + 10;
  const txtColor = (map && map.getZoom() >= 17) ? '#fff' : '#333';
  return L.divIcon({
    html: `<div style="width:${outer}px;height:${outer}px;border-radius:50%;background:${ro};display:flex;align-items:center;justify-content:center"><div style="width:${size}px;height:${size}px;border-radius:50%;background:${ri};display:flex;align-items:center;justify-content:center;font-size:${size>=38?13:11}px;font-weight:700;color:${txtColor}">${n}</div></div>`,
    className: '', iconSize:[outer,outer], iconAnchor:[outer/2,outer/2]
  });
}

// --- Cluster group ---
let clusterGroup = null;

const svgFotoSm = `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white' width='15' height='15' style='display:block'><path d='M20 5h-3.17L15 3H9L7.17 5H4C2.9 5 2 5.9 2 7v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm-8 13c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z'/></svg>`;
const svgVideoSm = `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white' width='15' height='15' style='display:block'><path d='M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z'/></svg>`;
function makePop(p) {
  const isFoto = p.tipo !== 'video';
  const typeIcon = `<span class="popup-type-icon ${isFoto ? 'foto' : 'video'}">${isFoto ? svgFotoSm : svgVideoSm}</span>`;
  const links = [];
  if (p.drive) links.push(`<a href="${p.drive}" target="_blank">Ver Arquivo</a>`);
  if (p.link_maps) links.push(`<a href="${p.link_maps}" target="_blank">Google Maps</a>`);
  const coords = `${p.lat.toFixed(6)}, ${p.lon.toFixed(6)}`;
  return `<div class="popup-title">${typeIcon}${p.arquivo}</div>
<div class="popup-field"><span class="popup-field-label">Bairro: </span>${p.bairro}</div>
<div class="popup-field"><span class="popup-field-label">Data: </span>${p.data}</div>
<div class="popup-coords"><span class="popup-field-label">Coord: </span>${coords}</div>
<div class="popup-links">${links.join('')}</div>`;
}

function buildMarkers(filtered) {
  if (clusterGroup) map.removeLayer(clusterGroup);
  clusterGroup = L.markerClusterGroup({
    maxClusterRadius: 50,
    showCoverageOnHover: false,
    chunkedLoading: true,
    zoomToBoundsOnClick: false,
    iconCreateFunction: makeClusterIcon,
  });
  clusterGroup.on('clusterclick', function(e) {
    if (map.getZoom() >= map.getMaxZoom() - 2) {
      e.layer.spiderfy();
    } else {
      map.setView(e.latlng, map.getZoom() + 1);
    }
  });

  for (const p of filtered) {
    const icon = p.tipo === 'video' ? iconVideo : iconFoto;
    const marker = L.marker([p.lat, p.lon], {icon});
    marker.bindPopup(makePop(p), {maxWidth: 300});
    clusterGroup.addLayer(marker);
  }
  map.addLayer(clusterGroup);
}

function applyFilter() {
  const showFoto = document.getElementById('filtro-foto').checked;
  const showVideo = document.getElementById('filtro-video').checked;
  const filtered = POINTS.filter(p => (p.tipo === 'foto' && showFoto) || (p.tipo === 'video' && showVideo));
  buildMarkers(filtered);
}

document.getElementById('filtro-foto').addEventListener('change', applyFilter);
document.getElementById('filtro-video').addEventListener('change', applyFilter);

let currentSat = false;
document.getElementById('basemap').addEventListener('change', function() {
  const v = this.value;
  map.removeLayer(osmLayer);
  map.removeLayer(satLayer);

  if (map.hasLayer(topoLayer)) map.removeLayer(topoLayer);

  if (v === 'osm') {
    hybridActive = false;
    map.addLayer(osmLayer);
    removeRoadsLayer();
    if (map.hasLayer(roadsLayer)) map.removeLayer(roadsLayer);
  } else if (v === 'satellite') {
    hybridActive = false;
    map.addLayer(satLayer);
    removeRoadsLayer();
    if (map.hasLayer(roadsLayer)) map.removeLayer(roadsLayer);
  } else if (v === 'hybrid') {
    hybridActive = true;
    map.addLayer(satLayer);
    addRoadsLayer();
    map.addLayer(roadsLayer);
  } else if (v === 'relevo') {
    hybridActive = false;
    map.addLayer(topoLayer);
    removeRoadsLayer();
    if (map.hasLayer(roadsLayer)) map.removeLayer(roadsLayer);
  }
});

// --- Zonas de Risco ---
const riscoLayers = { geo: null, hidro: null };
const riscoLoaded = { geo: false, hidro: false };

function riscoStyle(feature) {
  const color = feature.properties.color || '#9E9E9E';
  return { color, weight: 1.5, opacity: 0.9, fillColor: color, fillOpacity: 0.25 };
}

function riscoPopup(feature) {
  const p = feature.properties;
  const r = p.risco || '?';
  const color = p.color || '#9E9E9E';
  return `<b style="color:${color}">${r}</b> — ${p.processo || p.proc_hidro || ''}
<br><small>${p.bairro || ''} ${p.regiao ? '/ ' + p.regiao : ''}</small>
${p.populacao ? '<br><small>Pop: ' + p.populacao + ' | Ed: ' + (p.no_edifica || '?') + '</small>' : ''}`;
}

function loadRiscoLayer(tipo, callback) {
  if (riscoLoaded[tipo]) { callback(); return; }
  fetch(`risco_${tipo}.geojson`)
    .then(r => r.json())
    .then(data => {
      riscoLayers[tipo] = L.geoJSON(data, {
        style: riscoStyle,
        onEachFeature: (f, layer) => layer.bindPopup(riscoPopup(f), { maxWidth: 240 })
      });
      riscoLoaded[tipo] = true;
      callback();
    });
}

document.getElementById('toggle-geo').addEventListener('change', function() {
  if (this.checked) {
    loadRiscoLayer('geo', () => riscoLayers['geo'].addTo(map));
  } else if (riscoLayers['geo']) {
    map.removeLayer(riscoLayers['geo']);
  }
});

document.getElementById('toggle-hidro').addEventListener('change', function() {
  if (this.checked) {
    loadRiscoLayer('hidro', () => riscoLayers['hidro'].addTo(map));
  } else if (riscoLayers['hidro']) {
    map.removeLayer(riscoLayers['hidro']);
  }
});

// --- Busca local (OSM: bairros, ruas, pontos de referência) ---
function normalize(s) { return s.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim(); }
function fuzzyScore(query, target) {
  if (target.startsWith(query)) return 200;
  if (target.includes(query)) return 100 + (100 - target.length);
  let score = 0, ti = 0;
  for (const ch of query) { const idx = target.indexOf(ch, ti); if (idx !== -1) { score++; ti = idx + 1; } }
  return score > query.length * 0.6 ? score : 0;
}
const TYPE_ZOOM = { b: 15, r: 17, p: 18 };
const TYPE_LABEL = { b: 'bairro', r: 'rua', p: '' };
function searchIndex(q) {
  const nq = normalize(q);
  return SEARCH_INDEX.map(e => ({ ...e, score: fuzzyScore(nq, normalize(e.n)) }))
    .filter(e => e.score > 0).sort((a, b) => b.score - a.score).slice(0, 7);
}
const searchInput = document.getElementById('search-input');
const searchSuggestions = document.getElementById('search-suggestions');
function hideSuggestions() { searchSuggestions.style.display = 'none'; }
const searchPinIcon = L.divIcon({
  className: '',
  html: '<svg xmlns="http://www.w3.org/2000/svg" width="28" height="40" viewBox="0 0 28 40"><path d="M14 0C6.3 0 0 6.3 0 14c0 10.5 14 26 14 26S28 24.5 28 14C28 6.3 21.7 0 14 0z" fill="#e53935" stroke="white" stroke-width="1.5"/><circle cx="14" cy="14" r="6" fill="white"/></svg>',
  iconSize: [28, 40],
  iconAnchor: [14, 40]
});
let searchPin = null;
function placeSearchPin(lat, lon) {
  if (searchPin) { searchPin.remove(); searchPin = null; }
  searchPin = L.marker([lat, lon], { icon: searchPinIcon, zIndexOffset: 2000 }).addTo(map);
}
function showSuggestions(results) {
  if (!results.length) { hideSuggestions(); return; }
  searchSuggestions.innerHTML = '';
  results.forEach(e => {
    const div = document.createElement('div');
    const badge = e.t === 'p' ? e.sub : TYPE_LABEL[e.t];
    div.innerHTML = e.n + ' <span style="color:#607d8b;font-size:10px">' + badge + '</span>';
    div.addEventListener('mousedown', ev => { ev.preventDefault(); map.flyTo([e.lat, e.lon], TYPE_ZOOM[e.t] || 16, { duration: 1.2 }); placeSearchPin(e.lat, e.lon); searchInput.value = e.n; hideSuggestions(); });
    searchSuggestions.appendChild(div);
  });
  searchSuggestions.style.display = 'block';
}
let selectedIdx = -1;
function setSelected(idx) {
  const items = searchSuggestions.querySelectorAll('div');
  items.forEach((d, i) => d.style.background = i === idx ? '#1e5080' : '');
  selectedIdx = idx;
}
searchInput.addEventListener('input', function() {
  selectedIdx = -1;
  const q = this.value.trim();
  if (q.length < 2) { hideSuggestions(); return; }
  showSuggestions(searchIndex(q));
});
searchInput.addEventListener('keydown', function(e) {
  const items = searchSuggestions.querySelectorAll('div');
  if (e.key === 'ArrowDown') { e.preventDefault(); setSelected(Math.min(selectedIdx + 1, items.length - 1)); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); setSelected(Math.max(selectedIdx - 1, 0)); }
  else if (e.key === 'Enter') {
    e.preventDefault();
    if (searchSuggestions.style.display === 'block' && selectedIdx >= 0) {
      items[selectedIdx].dispatchEvent(new MouseEvent('mousedown'));
    } else if (searchSuggestions.style.display === 'block' && items.length > 0) {
      items[0].dispatchEvent(new MouseEvent('mousedown'));
    } else {
      const r = searchIndex(this.value.trim());
      if (r.length) showSuggestions(r);
    }
  }
  else if (e.key === 'Escape') hideSuggestions();
});
document.getElementById('search-btn').addEventListener('click', function() {
  if (searchSuggestions.style.display === 'block') { hideSuggestions(); return; }
  const r = searchIndex(searchInput.value.trim());
  if (r.length) showSuggestions(r);
});
document.addEventListener('click', e => { if (!e.target.closest('#search-wrap')) hideSuggestions(); });

buildMarkers(POINTS);
