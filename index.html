// --- Basemaps ---
const osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '© OpenStreetMap'
});
const satLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  maxZoom: 19,
  attribution: '© Esri'
});
const roadsLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', {
  minZoom: 13, maxZoom: 19, attribution: '© CartoDB', pane: 'labelsPane'
});
const topoLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}', {
  maxZoom: 19, attribution: '© Esri'
});

const map = L.map('map', {
  center: [-21.762, -43.35],
  zoom: 13,
  layers: [osmLayer]
});

map.createPane('labelsPane');
map.getPane('labelsPane').style.zIndex = 450;
map.getPane('labelsPane').style.pointerEvents = 'none';
map.getPane('labelsPane').style.mixBlendMode = 'screen';
map.getPane('labelsPane').style.filter = 'grayscale(1) invert(1) brightness(2) contrast(1.5)';

let roadsGeoJSON = null;
let roadsGeoJSONLayer = null;
let hybridActive = false;
const ROADS_MIN_ZOOM = 15;

// Pesos base por tipo de via (em zoom 15)
const BASE_WEIGHTS = {
  motorway: 20, trunk: 20, motorway_link: 12, trunk_link: 12,
  primary: 15, primary_link: 9,
  secondary: 10, secondary_link: 7,
  tertiary: 7, tertiary_link: 5,
  _default: 4
};

function scaleForZoom(base) {
  const z = map ? map.getZoom() : 15;
  // zoom 15 = base, cresce com zoom
  return base * Math.pow(2.0, (z - 17) / 2.5);
}

function getRoadStyle(feature) {
  const hw = feature.properties.highway;
  const base = BASE_WEIGHTS[hw] || BASE_WEIGHTS._default;
  const w = scaleForZoom(base);
  return {color:'#8a8a8a', weight:w, opacity:0.55, lineCap:'round', lineJoin:'round'};
}

function getRoadOutlineStyle(feature) {
  const hw = feature.properties.highway;
  const base = (BASE_WEIGHTS[hw] || BASE_WEIGHTS._default) + 1.5;
  const w = scaleForZoom(base);
  return {color:'rgba(0,0,0,0.4)', weight:w, opacity:1, lineCap:'round', lineJoin:'round'};
}

function loadRoadsGeoJSON(callback) {
  if (roadsGeoJSON) { callback(); return; }
  fetch('roads_jf.geojson')
    .then(r => r.json())
    .then(data => {
      roadsGeoJSON = data;
      callback();
    });
}

function updateRoadsVisibility() {
  if (!roadsGeoJSONLayer || !window._roadsOutline || !hybridActive) return;
  const show = map.getZoom() >= ROADS_MIN_ZOOM;
  if (show) {
    if (!map.hasLayer(window._roadsOutline)) map.addLayer(window._roadsOutline);
    if (!map.hasLayer(roadsGeoJSONLayer)) map.addLayer(roadsGeoJSONLayer);
  } else {
    if (map.hasLayer(window._roadsOutline)) map.removeLayer(window._roadsOutline);
    if (map.hasLayer(roadsGeoJSONLayer)) map.removeLayer(roadsGeoJSONLayer);
  }
}

function addRoadsLayer() {
  if (roadsGeoJSONLayer) {
    updateRoadsVisibility();
    return;
  }
  loadRoadsGeoJSON(function() {
    window._roadsOutline = L.geoJSON(roadsGeoJSON, {style: getRoadOutlineStyle, interactive: false});
    window._roadsFill = L.geoJSON(roadsGeoJSON, {style: getRoadStyle, interactive: false});
    roadsGeoJSONLayer = window._roadsFill;
    updateRoadsVisibility();
    map.on('zoomend', function() {
      if (!hybridActive) return;
      window._roadsOutline.setStyle(getRoadOutlineStyle);
      window._roadsFill.setStyle(getRoadStyle);
      updateRoadsVisibility();
    });
  });
}

function removeRoadsLayer() {
  if (window._roadsOutline) map.removeLayer(window._roadsOutline);
  if (roadsGeoJSONLayer) map.removeLayer(roadsGeoJSONLayer);
}


// --- Icons ---
const iconFoto = L.divIcon({
  className: '',
  html: '<div style="width:14px;height:14px;border-radius:50%;background:#4caf50;border:2px solid #1b5e20;box-shadow:0 1px 4px rgba(0,0,0,.7)"></div>',
  iconSize: [14,14], iconAnchor: [7,7]
});
const iconVideo = L.divIcon({
  className: '',
  html: '<div style="width:14px;height:14px;border-radius:50%;background:#ff9800;border:2px solid #7f3900;box-shadow:0 1px 4px rgba(0,0,0,.7)"></div>',
  iconSize: [14,14], iconAnchor: [7,7]
});

// --- Cluster group ---
let clusterGroup = null;

function makePop(p) {
  const badge = p.tipo === 'video'
    ? '<span class="badge-video">▶ vídeo</span>'
    : '<span class="badge-foto">📷 foto</span>';
  const links = [];
  if (p.drive) links.push(`<a href="${p.drive}" target="_blank">Drive</a>`);
  if (p.link_maps) links.push(`<a href="${p.link_maps}" target="_blank">Maps</a>`);
  return `<div class="popup-title">${p.arquivo}</div>
<div class="popup-bairro">${p.bairro}</div>
<div class="popup-data">${badge} &nbsp; ${p.data}</div>
<div class="popup-links">${links.join('')}</div>`;
}

function buildMarkers(filtered) {
  if (clusterGroup) map.removeLayer(clusterGroup);
  clusterGroup = L.markerClusterGroup({
    maxClusterRadius: 50,
    showCoverageOnHover: false,
    chunkedLoading: true,
    zoomToBoundsOnClick: false,
  });
  clusterGroup.on('clusterclick', function(e) {
    if (map.getZoom() >= map.getMaxZoom() - 2) {
      e.layer.spiderfy();
    } else {
      map.setView(e.latlng, map.getZoom() + 1);
    }
  });

  for (const p of filtered) {
    const icon = p.tipo === 'video' ? iconVideo : iconFoto;
    const marker = L.marker([p.lat, p.lon], {icon});
    marker.bindPopup(makePop(p), {maxWidth: 300});
    clusterGroup.addLayer(marker);
  }
  map.addLayer(clusterGroup);
}

function applyFilter() {
  const tipo = document.getElementById('filtro-tipo').value;
  let filtered = POINTS;
  if (tipo !== 'todos') filtered = filtered.filter(p => p.tipo === tipo);
  buildMarkers(filtered);
}

document.getElementById('filtro-tipo').addEventListener('change', applyFilter);

// --- Basemap switcher ---
let currentSat = false;
document.getElementById('basemap').addEventListener('change', function() {
  const v = this.value;
  map.removeLayer(osmLayer);
  map.removeLayer(satLayer);

  if (map.hasLayer(topoLayer)) map.removeLayer(topoLayer);

  if (v === 'osm') {
    hybridActive = false;
    map.addLayer(osmLayer);
    removeRoadsLayer();
    if (map.hasLayer(roadsLayer)) map.removeLayer(roadsLayer);
  } else if (v === 'satellite') {
    hybridActive = false;
    map.addLayer(satLayer);
    removeRoadsLayer();
    if (map.hasLayer(roadsLayer)) map.removeLayer(roadsLayer);
  } else if (v === 'hybrid') {
    hybridActive = true;
    map.addLayer(satLayer);
    addRoadsLayer();
    map.addLayer(roadsLayer);
  } else if (v === 'relevo') {
    hybridActive = false;
    map.addLayer(topoLayer);
    removeRoadsLayer();
    if (map.hasLayer(roadsLayer)) map.removeLayer(roadsLayer);
  }
});

// --- Zonas de Risco ---
const riscoLayers = { geo: null, hidro: null };
const riscoLoaded = { geo: false, hidro: false };

function riscoStyle(feature) {
  const color = feature.properties.color || '#9E9E9E';
  return { color, weight: 1.5, opacity: 0.9, fillColor: color, fillOpacity: 0.25 };
}

function riscoPopup(feature) {
  const p = feature.properties;
  const r = p.risco || '?';
  const color = p.color || '#9E9E9E';
  return `<b style="color:${color}">${r}</b> — ${p.processo || p.proc_hidro || ''}
<br><small>${p.bairro || ''} ${p.regiao ? '/ ' + p.regiao : ''}</small>
${p.populacao ? '<br><small>Pop: ' + p.populacao + ' | Ed: ' + (p.no_edifica || '?') + '</small>' : ''}`;
}

function loadRiscoLayer(tipo, callback) {
  if (riscoLoaded[tipo]) { callback(); return; }
  fetch(`risco_${tipo}.geojson`)
    .then(r => r.json())
    .then(data => {
      riscoLayers[tipo] = L.geoJSON(data, {
        style: riscoStyle,
        onEachFeature: (f, layer) => layer.bindPopup(riscoPopup(f), { maxWidth: 240 })
      });
      riscoLoaded[tipo] = true;
      callback();
    });
}

document.getElementById('toggle-geo').addEventListener('change', function() {
  if (this.checked) {
    loadRiscoLayer('geo', () => riscoLayers['geo'].addTo(map));
  } else if (riscoLayers['geo']) {
    map.removeLayer(riscoLayers['geo']);
  }
});

document.getElementById('toggle-hidro').addEventListener('change', function() {
  if (this.checked) {
    loadRiscoLayer('hidro', () => riscoLayers['hidro'].addTo(map));
  } else if (riscoLayers['hidro']) {
    map.removeLayer(riscoLayers['hidro']);
  }
});
