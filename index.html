// --- Basemaps ---
const osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '© OpenStreetMap'
});
const satLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  maxZoom: 19,
  attribution: '© Esri'
});
const roadsLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Transportation/MapServer/tile/{z}/{y}/{x}', {
  maxZoom: 19, attribution: '© Esri'
});
const labelLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', {
  maxZoom: 19, attribution: '© Esri'
});

const map = L.map('map', {
  center: [-21.762, -43.35],
  zoom: 13,
  layers: [osmLayer]
});

// --- Icons ---
const iconFoto = L.divIcon({
  className: '',
  html: '<div style="width:14px;height:14px;border-radius:50%;background:#4caf50;border:2px solid #1b5e20;box-shadow:0 1px 4px rgba(0,0,0,.7)"></div>',
  iconSize: [14,14], iconAnchor: [7,7]
});
const iconVideo = L.divIcon({
  className: '',
  html: '<div style="width:14px;height:14px;border-radius:50%;background:#ff9800;border:2px solid #7f3900;box-shadow:0 1px 4px rgba(0,0,0,.7)"></div>',
  iconSize: [14,14], iconAnchor: [7,7]
});

// --- Cluster group ---
let clusterGroup = null;

function makePop(p) {
  const badge = p.tipo === 'video'
    ? '<span class="badge-video">▶ vídeo</span>'
    : '<span class="badge-foto">📷 foto</span>';
  const links = [];
  if (p.drive) links.push(`<a href="${p.drive}" target="_blank">Drive</a>`);
  if (p.link_maps) links.push(`<a href="${p.link_maps}" target="_blank">Maps</a>`);
  return `<div class="popup-title">${p.arquivo}</div>
<div class="popup-bairro">${p.bairro}</div>
<div class="popup-data">${badge} &nbsp; ${p.data}</div>
<div class="popup-links">${links.join('')}</div>`;
}

function buildMarkers(filtered) {
  if (clusterGroup) map.removeLayer(clusterGroup);
  clusterGroup = L.markerClusterGroup({
    maxClusterRadius: 50,
    showCoverageOnHover: false,
    chunkedLoading: true,
  });
  for (const p of filtered) {
    const icon = p.tipo === 'video' ? iconVideo : iconFoto;
    const marker = L.marker([p.lat, p.lon], {icon});
    marker.bindPopup(makePop(p), {maxWidth: 300});
    clusterGroup.addLayer(marker);
  }
  map.addLayer(clusterGroup);
}

function applyFilter() {
  const tipo = document.getElementById('filtro-tipo').value;
  let filtered = POINTS;
  if (tipo !== 'todos') filtered = filtered.filter(p => p.tipo === tipo);
  buildMarkers(filtered);
}

document.getElementById('filtro-tipo').addEventListener('change', applyFilter);

// --- Basemap switcher ---
let currentSat = false;
document.getElementById('basemap').addEventListener('change', function() {
  const v = this.value;
  map.removeLayer(osmLayer);
  map.removeLayer(satLayer);
  map.removeLayer(labelLayer);
  if (v === 'osm') {
    map.addLayer(osmLayer);
  } else if (v === 'satellite') {
    map.addLayer(satLayer);
  } else if (v === 'hybrid') {
    map.addLayer(satLayer);
    map.addLayer(roadsLayer);
    map.addLayer(labelLayer);
  }
});

// --- Init ---
buildMarkers(POINTS);
</script>
